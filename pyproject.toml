[tool.ruff]
line-length = 80
target-version = "py312"
src = ["scalar_field_belief"]

[tool.ruff.format]
quote-style = "single"

[tool.ruff.lint]
select = ["Q", "E", "F", "W", "I", "C", "B"]
ignore = ["D", "INP001"]

[tool.ruff.lint.flake8-quotes]
inline-quotes = "single"
multiline-quotes = "double"
docstring-quotes = "double"

[tool.ruff.lint.isort]
known-first-party = ["scalar_field_belief"]